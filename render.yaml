services:
  - type: web
    name: pdis
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: uvicorn pdis.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NODE_VERSION
        value: "20"
